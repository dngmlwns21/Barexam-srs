<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="변호사시험 SRS — AI 기반 스마트 간격 반복 학습" />
  <meta name="theme-color" content="#2563EB" />
  <meta property="og:title" content="변호사시험 SRS" />
  <meta property="og:description" content="SM-2 알고리즘 기반 변호사시험 스마트 암기 앱" />
  <title>변호사시험 SRS</title>
  <!-- FIX M-8: Apply dark mode BEFORE CSS renders to prevent white flash -->
  <script>
    (function () {
      if (localStorage.getItem('dark_mode') === '1') {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <div class="loading-screen" id="loading-screen">
      <div class="spinner"></div>
      <p>로딩 중…</p>
    </div>

    <div class="login-screen" id="login-screen" hidden>
      <div class="login-card">
        <h1>⚖️ 변호사시험 SRS</h1>
        <div class="tabs">
          <button class="tab-btn active" id="tab-login" type="button">로그인</button>
          <button class="tab-btn" id="tab-register" type="button">회원가입</button>
        </div>
        <form class="auth-form" id="auth-form">
          <div class="form-group">
            <label for="auth-email">이메일</label>
            <input type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" required />
          </div>
          <div class="form-group" id="name-group" hidden>
            <label for="auth-name">이름 (선택)</label>
            <input type="text" id="auth-name" placeholder="홍길동" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="auth-password">비밀번호</label>
            <input type="password" id="auth-password" placeholder="8자 이상" autocomplete="current-password" required />
          </div>
          <div class="auth-error" id="auth-error"></div>
          <button type="submit" class="btn-auth" id="btn-auth-submit">로그인</button>
        </form>
      </div>
    </div>

    <div id="dynamic-screen"></div>

    <nav class="bottom-nav" id="bottom-nav" hidden>
      <button class="nav-tab active" id="nav-home" data-tab="home" type="button">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">홈</span>
      </button>
      <button class="nav-tab" id="nav-study" data-tab="study" type="button">
        <span class="nav-icon">📚</span>
        <span class="nav-label">학습</span>
      </button>
      <button class="nav-tab" id="nav-search" data-tab="search" type="button">
        <span class="nav-icon">🔍</span>
        <span class="nav-label">검색</span>
      </button>
      <button class="nav-tab" id="nav-mypage" data-tab="mypage" type="button">
        <span class="nav-icon">👤</span>
        <span class="nav-label">내 정보</span>
      </button>
    </nav>
  </div>
  <!-- Help modal (keyboard shortcuts) -->
  <div id="help-modal" class="help-modal" hidden>
    <div class="help-modal-box">
      <div class="help-modal-header">
        <strong>키보드 단축키</strong>
        <button id="help-close" class="help-close-btn">✕</button>
      </div>
      <table class="help-table">
        <tbody>
          <tr><td><kbd>1</kbd>–<kbd>5</kbd></td><td>객관식 보기 선택</td></tr>
          <tr><td><kbd>O</kbd> / <kbd>X</kbd></td><td>O/X 선택</td></tr>
          <tr><td><kbd>Space</kbd></td><td>다음 카드 / 알맞음 평가</td></tr>
          <tr><td><kbd>H</kbd></td><td>어려움 (Hard)</td></tr>
          <tr><td><kbd>G</kbd></td><td>알맞음 (Good)</td></tr>
          <tr><td><kbd>E</kbd></td><td>쉬움 (Easy)</td></tr>
          <tr><td><kbd>U</kbd></td><td>실수 취소 (Undo)</td></tr>
          <tr><td><kbd>?</kbd></td><td>이 도움말</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
