steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/gamzafactory:$COMMIT_SHA
      - -t
      - gcr.io/$PROJECT_ID/gamzafactory:latest
      - .
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/gamzafactory']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gamzafactory
      - --image=gcr.io/$PROJECT_ID/gamzafactory:$COMMIT_SHA
      - --region=asia-northeast3
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --concurrency=80

images:
  - 'gcr.io/$PROJECT_ID/gamzafactory'

options:
  logging: CLOUD_LOGGING_ONLY
