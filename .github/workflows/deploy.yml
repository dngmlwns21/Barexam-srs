name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build and push image
        run: |
          docker build -t gcr.io/barexam-srs/gamzafactory:latest .
          docker push gcr.io/barexam-srs/gamzafactory:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy gamzafactory \
            --image gcr.io/barexam-srs/gamzafactory:latest \
            --region asia-northeast3 \
            --project barexam-srs \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --quiet
